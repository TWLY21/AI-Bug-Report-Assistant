version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: bugsense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bugsense
    ports:
      - "5432:5432"
    volumes:
      - bugsense_pg_data:/var/lib/postgresql/data

volumes:
  bugsense_pg_data:
